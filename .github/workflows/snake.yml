name: Generate Snake

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from contribution grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LukeMcCann
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2300FF41&color_dots=%23161B22,%23004d20,%23006e2e,%23009a3f,%2300FF41

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
